# ~/.config/kara/kara-beautify.toml
#
# Optional — if this file doesn't exist, every consumer is enabled
# and beautify writes every renderer's output on `kara-beautify apply`.
#
# Use the [consumers] block to opt out of individual renderers. This
# is the primary tool for coordinating kara-beautify with a dotfiles
# repo: set a consumer to `false` and beautify stops writing its
# output file AND stops sending reload signals, so your hand-managed
# config stays authoritative.
#
# Ownership reference:
#
#   kara_gate — writes ~/.local/state/kara/generated/kara-gate-theme.conf
#               user's kara-gate.conf pulls it in with `include`.
#               User config file: your dotfiles / ~/.config/kara/kara-gate.conf
#
#   kitty     — writes ~/.local/state/kara/generated/kitty-theme.conf
#               user's kitty.conf pulls it in with `include`.
#
#   foot      — PATCHES the [colors-dark] / [colors-light] section
#               of ~/.config/foot/foot.ini in place. kara owns only
#               the color keys (alpha/foreground/background/
#               selection-*/urls/regular0-7/bright0-7). Every other
#               key in the file is preserved.
#
#               IMPORTANT: foot has NO config reload mechanism.
#               foot 1.26's SIGUSR1/SIGUSR2 only toggle between
#               cached [colors] and [colors2] sections loaded at
#               server startup — they do not re-read foot.ini from
#               disk. This means a running `foot --server` will
#               KEEP SHOWING whatever colors it had at startup
#               until it is restarted. New footclients connect to
#               the running server and inherit those cached colors.
#
#               So: kara-beautify patches foot.ini on every theme
#               apply (good for the next `foot --server` launch),
#               but existing foot sessions stay on the old theme.
#               Restart foot manually (pkill foot && foot --server &)
#               when you want to see a theme change take effect.
#
#               A `[consumers.foot.reload_strategy] = "restart"`
#               opt-in is planned once session persistence (item J)
#               can auto-reattach tmux sessions after the restart.
#
#               A human-readable preview is also written to
#               ~/.local/state/kara/generated/foot-theme.ini for
#               `kara-beautify render <theme> foot` inspection.
#
#   nvim      — writes ~/.local/state/kara/generated/nvim-theme.lua
#               the kara.nvim plugin (oracle.core.kara_theme in this
#               repo's dotfiles reference impl) consumes it on apply.
#
#   tmux      — writes ~/.local/state/kara/generated/tmux-theme.conf
#               user's tmux.conf pulls it in with `source-file`.
#
#   fzf       — writes ~/.local/state/kara/generated/fzf-theme.sh
#               user's shell rc sources it.
#
#   session   — writes ~/.local/state/kara/generated/session-theme.sh
#               user's shell profile or session startup sources it.
#
#   gtk       — PATCHES ~/.config/gtk-3.0/settings.ini and
#               ~/.config/gtk-4.0/settings.ini in place. Only the five
#               theming keys are touched; any font, button order, or
#               custom keys from your dotfiles are preserved. If you
#               prefer to own settings.ini entirely yourself, set this
#               to `false` and beautify will skip it (and gsettings).

[consumers]
# Every flag defaults to `true`. Uncomment and set to `false` to opt
# out of a renderer you'd rather manage by hand.
# kara_gate = true
# kitty     = true
# foot      = true
# nvim      = true
# tmux      = true
# fzf       = true
# session   = true
# gtk       = true
