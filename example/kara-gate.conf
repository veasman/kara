# kara-gate configuration
# ~/.config/kara/kara-gate.conf
#
# Reload with mod+Shift+r or: pkill -USR1 kara-gate
# Lines starting with # are comments.
# Use `include` to split config across files (max depth 16).

# Variables — referenced with $name anywhere below.
$terminal = kitty

# ----------------------------------------------------------------------
# General
# ----------------------------------------------------------------------

general {
    font "FiraCode Nerd Font"   # font / font_family
    font_size 14                # bar and title font size

    border_px 2                 # border_px / border_width
    border_radius 4             # border_radius / rounding (0 = sharp)
    gap_px 8                    # gap between tiled windows
    default_mfact 0.5           # master area ratio (0.05 - 0.95)
    sync_workspaces true        # all monitors share the same workspace

    cursor_theme "Bibata-Modern-Classic"
    cursor_size 24
}

# ----------------------------------------------------------------------
# Theme
# All values are 0xRRGGBB hex colors.
# These derive border, bar, and workspace indicator colors at runtime.
# ----------------------------------------------------------------------

theme {
    bg 0x111111                 # bg / background
    surface 0x1b1b1b
    text 0xf2f2f2
    text_muted 0x5c5c5c        # text_muted / muted
    accent 0x6bacac
    accent_soft 0x458588
    border 0x353535
}

# ----------------------------------------------------------------------
# Environment
# Set environment variables and source files before clients start.
# Processed in order — later entries can use earlier ones.
# ----------------------------------------------------------------------

environment {
    env XDG_CURRENT_DESKTOP "kara"
    env XDG_SESSION_TYPE "wayland"
    env QT_QPA_PLATFORM "wayland"
    env MOZ_ENABLE_WAYLAND "1"
    env _JAVA_AWT_WM_NONREPARENTING "1"
    env ELECTRON_OZONE_PLATFORM_HINT "wayland"
}

# ----------------------------------------------------------------------
# Input
# Per-device libinput configuration.
# Top-level keys are defaults; device "name" { } overrides per device.
# ----------------------------------------------------------------------

input {
    # Global defaults
    # accel_profile adaptive    # flat | adaptive
    # natural_scroll false
    # tap_to_click true
    # dwt true                  # disable while typing

    # Per-device overrides (match by libinput device name)
    # device "BT mouse" {
    #     accel_profile flat
    #     accel_speed 0
    # }
}

# ----------------------------------------------------------------------
# Monitor
# Configure output resolution, position, refresh rate, rotation, scale.
#
# Name must match the connector name exactly as kara sees it. Kara uses
# the Wayland/DRM canonical name: <iface>-<id>. Common examples:
#   DP-1, DP-2          — DisplayPort
#   HDMI-A-1            — HDMI
#   eDP-1               — embedded laptop display
#   DVI-I-1, DVI-I-2    — DVI (NOTE: in X11/xrandr you may see these
#                         as `DVI-I-1-1` because of reverse-PRIME provider
#                         numbering — kara uses the bare kernel name)
#
# Monitor blocks are OVERRIDES, not a gate. Every connected output is
# used by default. Listed monitors get their config applied; unlisted
# connected outputs are used with auto-detect defaults; entries whose
# connector isn't plugged in right now are silently ignored (so you can
# leave your full work-laptop config in place and unplug the dock
# without comment-toggling).
#
# To explicitly exclude a connected monitor, set `enabled false`.
#
# ── automatic undocked fallback ──────────────────────────────────────
# If every connected output would be disabled by your config (e.g. you
# have `monitor "eDP-1" { enabled false }` for the docked workflow,
# and right now only eDP-1 is connected because the dock is unplugged),
# kara notices before enumeration and ignores `enabled false` across
# the board for that session. A WARN log line surfaces the fallback so
# you can see it happened. This lets the same config cover both the
# docked and the laptop-alone workflow — no editing required.
# ----------------------------------------------------------------------

# TERSE ONE-LINER FORM (recommended for simple overrides):
#
# monitors {
#     "DP-2"    resolution 2560x1440 refresh 144 position 0,0 primary
#     "HDMI-A-1" resolution 1920x1080 position 2560,0
# }

# FULL-BLOCK FORM (use when you have lots of settings per monitor):
#
# monitors {
#     "DVI-I-1" {
#         resolution 1920x1080
#         position 0,0
#         rotate right              # normal | left | right | flipped
#     }
#     "DP-2" {
#         resolution 1920x1080
#         refresh 60
#         position 1080,0
#         primary                   # receives initial focus on startup
#     }
#     "DVI-I-2" {
#         resolution 1920x1080
#         position 3000,0
#     }
#     "eDP-1" {
#         enabled false             # disable the laptop lid while docked
#     }
# }

# ----------------------------------------------------------------------
# Animations
# ----------------------------------------------------------------------

animations {
    preset swoosh           # instant | clean | swoosh
    duration 150            # ms, applies to all transitions
}

# ----------------------------------------------------------------------
# Bar
#
# The bar and its modules are two separate concerns. Each has a
# parallel set of appearance knobs: rounded corners, border, background
# color, alpha, blur. The `pill` toggle is global — all modules render
# pill-style or none do, and every module shares the same pill border /
# alpha / rounding.
#
# Per-module content (color, volume bar dimensions, clock format, etc.)
# lives inline on the module's declaration line inside `modules { }`.
#
# Spatial model (outside → in):
#   bar surface (full width × `height`, rounded/bordered/transparent)
#     → edge_padding_x/y           inset to first/last module
#       → modules separated by module_gap
#         → each module has module_padding_x/y inside (pill mode) and
#           its own rounded/bordered/transparent background
# ----------------------------------------------------------------------

bar {
    enabled true                    # show/hide the bar entirely
    position top                    # top / bottom
    height 28                       # bar height in pixels

    # ── Bar surface appearance ───────────────────────────────────
    background true                 # draw the bar's background at all
    # background_color #1b1b1b      # override theme.bg (optional)
    background_alpha 220            # 0-255, lower = more transparent
    rounded 0                       # bar corner radius (0 = square)
    border_px 0                     # bar border thickness
    # border_color #353535          # optional, defaults to theme.border
    blur false                      # blur desktop behind bar (GL — not yet rendered)

    # ── Module appearance (shared by all modules) ────────────────
    pill false                      # all modules in/out of pill mode together
    # module_background #1b1b1b     # pill fill color, defaults to theme.surface
    module_alpha 255                # 0-255 for pill fills
    module_rounded 8                # pill corner radius
    module_border_px 0              # pill border thickness
    # module_border_color #353535
    module_blur false               # blur behind pills (not yet rendered)

    icons true                      # show nerd-font icons in modules
    colors true                     # colorize modules by state
    minimal false                   # minimal presentation mode

    edge_padding_x 14               # inset from bar edge to first/last module
    edge_padding_y 2                # vertical inset of module row
    module_gap 18                   # spacing between adjacent modules
    module_padding_x 12             # horizontal padding inside pill
    module_padding_y 6              # vertical padding inside pill

    # ── Modules ─────────────────────────────────────────────────
    #
    # Each line is `<section> <module-name> [positional-args...]`.
    # Sections are `left`, `center`, `right`. Inline args are positional
    # and module-specific — there are no `key value` pairs.
    #
    # Module reference (positional args per module, in order):
    #
    #   workspaces
    #     9-workspace indicator row. No args.
    #
    #   monitor
    #     Current monitor number + sync indicator. Foreground color
    #     conveys focus/sync state (accent = focused, accent_soft =
    #     sync on, text = unfocused). No args.
    #
    #   title
    #     Focused window title, truncated to ~60 chars. No args.
    #
    #   status
    #     Arbitrary text set via IPC (future). No args.
    #
    #   clock [strftime]
    #     Time / date. Arg is an optional strftime format string;
    #     default is `"%a %b %d • %H:%M"`.
    #     Example: `right clock "%H:%M"`
    #
    #   volume [size]
    #     Audio volume via wpctl (PipeWire/PulseAudio). Arg is the
    #     size of the inline bar graph next to the percentage:
    #       small | med | large | none
    #     `none` hides the bar graph entirely. Default is `med`.
    #     Example: `right volume large`
    #
    #   network
    #     Network connectivity. Shows wifi SSID + signal %, or `eth`
    #     for wired, or `offline`. `wifi` is an alias. No args.
    #
    #   battery
    #     Battery percentage + charging/full state. No args.
    #
    #   brightness
    #     Screen brightness via /sys/class/backlight. No args.
    #
    #   media
    #     Media player info via playerctl (title, play/pause/stop).
    #     No args.
    #
    #   memory
    #     RAM usage percentage. `ram` is an alias. No args.
    #
    #   cpu
    #     CPU usage percentage. No args.
    #
    #   weather
    #     Weather via `KARA_WEATHER_CMD` env var — same as
    #     `script:weather` below. No args.
    #
    #   custom <command>
    #     Run an arbitrary shell command and display its stdout.
    #     Example: `right custom "uptime -p"`
    #
    #   script:<name>
    #     Run the command in the `KARA_<NAME>_CMD` env var and display
    #     its stdout, cached. Name is lowercase in config, uppercased
    #     for the env var lookup. No positional args.
    #     Examples:
    #       right script:weather
    #       right script:updates
    #       right script:disk

    modules {
        # Adjacent modules that share a `group:<name>` id collapse into
        # one continuous pill. Modules without `group:` are each their
        # own pill. Groups only merge neighbors in the SAME section —
        # `left group:nav` and `right group:nav` stay separate.
        #
        # Example: monitor + workspaces share `group:nav`, so they
        # render as one pill on the left. cpu + memory + network
        # share `group:system` for one stacked right-side status pill,
        # while volume and clock remain standalone pills to their right.
        left monitor group:nav
        left workspaces group:nav

        center title

        right cpu group:system
        right memory group:system
        right network group:system
        right volume med
        right clock "%a %d %b %H:%M"
    }
}

# ----------------------------------------------------------------------
# Scratchpad
# A floating overlay workspace toggled with a keybind.
# Autostart commands run on first toggle if the scratchpad is empty.
# ----------------------------------------------------------------------

scratchpad "main" {
    gap_px 30                       # pixels of inset from workarea edge on all sides
    dim_alpha 120                   # background dim opacity (0-255)
    blur false                      # blur background (future)
    autostart "$terminal"           # command run on first toggle
    # capture app_id "kitty"        # capture windows by app_id
}

# scratchpad "mixer" {
#     gap_px 200
#     dim_alpha 128
#     autostart "pavucontrol"
#     capture app_id "pavucontrol"
# }

# scratchpad "music" {
#     gap_px 160
#     dim_alpha 96
#     autostart "spotify"
#     capture app_id "spotify"
# }

# ----------------------------------------------------------------------
# Rules
# Float and workspace placement rules matched by app_id.
# ----------------------------------------------------------------------

rules {
    # Force windows to float
    float app_id "pavucontrol"
    float app_id "mpv"

    # Assign to workspace (1-9)
    # workspace 8 app_id "thunderbird"

    # Assign to workspace on a specific monitor (1-indexed)
    # workspace 3 app_id "firefox" monitor 1
}

# ----------------------------------------------------------------------
# Autostart
# Commands run once at startup. Not re-run on config reload.
#
# Each entry is `run "<command>" [app_id "X"] [monitor N] [workspace N]`.
# `monitor` and `workspace` are 1-indexed and require `app_id` so kara can
# match the spawned window at map time and route it to the target slot.
#
# Nested `when monitor "NAME"` / `when not monitor "NAME"` blocks let you
# run different entries depending on which monitors are connected. Useful
# for "different autostart at the dock vs alone on the laptop". `when`
# clauses can be combined with `not` for exclusions; `when` without any
# condition (just plain `autostart { }`) always matches.
#
# ── app_id routing gotcha ────────────────────────────────────────────
# The `app_id "X"` value must match the app_id that the *window* exposes
# to the compositor — NOT the command you type. Kara queues a route
# with your declared app_id, then matches it against the new toplevel's
# wl_output app_id at map time. If they don't match, the window falls
# through to the focused output and monitor/workspace is ignored.
#
# Common traps:
#   • `footclient` creates a window with app_id "foot" by default.
#     Pass `--app-id=footclient` (or any name) to override — whichever
#     name you pick, use the same string in `app_id "…"` on that line.
#   • Electron apps (Slack, Discord, VS Code) usually report their
#     name with a leading capital — "Slack", not "slack". Check with
#     `kara-gate` logs or `wayland-info`.
#   • Mozilla apps (Firefox, Floorp, Thunderbird) use their lowercase
#     brand name as the default app_id.
#   • Python/Qt/GTK apps may report their executable name or a class
#     set explicitly in code. Check their source or runtime info.
#
# When the autostart spawn command is a wrapper that exits before
# producing its own toplevel (like `footclient`), kara's route queue
# auto-expires entries after 5 seconds to prevent a stale route from
# trapping a later manually-launched window with the same app_id.
# ----------------------------------------------------------------------

autostart {
    # ── Daemons that run regardless of hardware profile ─────────────
    run "kara-whisper"
    run "kara-beautify daemon"
    run "foot --server"

    # ── Default "app set": example dock profile ─────────────────────
    # Only runs when the DisplayLink dock's DVI-I-1 is present. A
    # terminal on the primary monitor, Slack and Thunderbird on the
    # side monitors. Copy and adapt for your own hardware — change the
    # monitor name, the commands, and the target monitor/workspace
    # numbers to match your setup.
    when monitor "DVI-I-1" {
        run "footclient --app-id=footclient" app_id "footclient" monitor 1 workspace 1
        run "slack"                           app_id "Slack"      monitor 2 workspace 1
        run "thunderbird"                     app_id "thunderbird" monitor 3 workspace 1
    }

    # ── Default "app set": example laptop profile ───────────────────
    # Only runs when the dock ISN'T plugged in. Just a terminal,
    # letting the user lay the session out by hand on one screen.
    when not monitor "DVI-I-1" {
        run "footclient"
    }
}

# ----------------------------------------------------------------------
# Commands
# Named commands referenced by keybinds via `spawn "name"`.
# Commands are split into argv (no shell expansion).
# ----------------------------------------------------------------------

commands {
    terminal "$terminal"

    vol-up "wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+"
    vol-down "wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-"
    vol-mute "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle"

    bright-up "brightnessctl set +10%"
    bright-down "brightnessctl set 10%-"

    media-play "playerctl play-pause"
    media-next "playerctl next"
    media-prev "playerctl previous"
}

# ----------------------------------------------------------------------
# Keybinds
# Format: "modifier+key" action [arg]
#
# Modifiers: mod (Super), Shift, Ctrl, Alt
# Key names: xkbcommon names (Return, bracketleft, XF86AudioRaiseVolume, etc.)
#
# Range expansion: {1-9} expands to 9 keybinds.
#
# Actions:
#   spawn "cmd-name"    - run a named command (from commands block)
#   exec "command"      - run a raw shell command directly
#   scratchpad          - toggle scratchpad overlay
#   scratchpad "name"   - toggle a named scratchpad
#   focus_next/prev     - cycle focus between tiled windows
#   focus_monitor_next/prev - move focus between monitors
#   send_monitor_next/prev  - send focused window to next/prev monitor
#   decrease/increase_mfact - resize master area
#   zoom_master         - swap focused window into master
#   monocle             - toggle monocle (single window) layout
#   fullscreen          - toggle true fullscreen
#   toggle_sync         - toggle workspace sync across monitors
#   toggle_float / float - toggle floating mode for focused window
#   kill_client         - close focused window
#   show_keybinds       - show/hide keybind overlay
#   reload              - reload config (SIGUSR1)
#   quit                - exit kara-gate
#   view_ws N           - switch to workspace N (1-9)
#   send_ws N           - send focused window to workspace N (1-9)
# ----------------------------------------------------------------------

binds {
    "mod+Return" spawn "terminal"
    "mod+d" exec "kara-summon"
    "Print" exec "kara-glimpse --quick"
    "mod+Shift+s" exec "kara-glimpse"

    "mod+slash" show_keybinds

    "mod+apostrophe" scratchpad "main"

    "mod+j" focus_next
    "mod+k" focus_prev
    "mod+h" focus_monitor_prev
    "mod+l" focus_monitor_next
    "mod+Shift+h" send_monitor_prev
    "mod+Shift+l" send_monitor_next

    "mod+bracketleft" decrease_mfact
    "mod+bracketright" increase_mfact
    "mod+Shift+Return" zoom_master

    "mod+f" monocle
    "mod+Shift+f" fullscreen
    "mod+t" toggle_float
    "mod+Shift+t" exec "kara-summon --mode themes"
    "mod+s" toggle_sync
    "mod+q" kill_client
    "mod+Shift+r" reload
    "mod+Shift+q" quit

    "mod+{1-9}" view_ws {1-9}
    "mod+Shift+{1-9}" send_ws {1-9}

    "XF86AudioRaiseVolume" spawn "vol-up"
    "XF86AudioLowerVolume" spawn "vol-down"
    "XF86AudioMute" spawn "vol-mute"

    "XF86MonBrightnessUp" spawn "bright-up"
    "XF86MonBrightnessDown" spawn "bright-down"

    "XF86AudioPlay" spawn "media-play"
    "XF86AudioNext" spawn "media-next"
    "XF86AudioPrev" spawn "media-prev"
}

# ----------------------------------------------------------------------
# Includes
# Split config into multiple files. Paths are relative to this file
# or absolute. ~ expands to $HOME. Max include depth: 16.
# ----------------------------------------------------------------------

# kara-beautify owns the color palette when enabled. Uncomment the
# line below to let `kara-beautify apply <theme>` take over the
# `theme { }` block above. The include is loaded AFTER the inline
# theme block so it wins when present; the file is silently skipped
# (warning only) if you haven't applied a theme yet.
#
# include "~/.local/state/kara/generated/kara-gate-theme.conf"
