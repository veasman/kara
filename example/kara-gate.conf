# kara-gate configuration
# ~/.config/kara/kara-gate.conf
#
# Reload with mod+Shift+r or: pkill -USR1 kara-gate
# Lines starting with # are comments.
# Use `include` to split config across files (max depth 16).

# Variables — referenced with $name anywhere below.
$terminal = kitty

# ----------------------------------------------------------------------
# General
# ----------------------------------------------------------------------

general {
    font "FiraCode Nerd Font"   # font / font_family
    font_size 14                # bar and title font size

    border_px 2                 # border_px / border_width
    border_radius 4             # border_radius / rounding (0 = sharp)
    gap_px 8                    # gap between tiled windows
    default_mfact 0.5           # master area ratio (0.05 - 0.95)
    sync_workspaces true        # all monitors share the same workspace

    cursor_theme "Bibata-Modern-Classic"
    cursor_size 24
}

# ----------------------------------------------------------------------
# Theme
# All values are 0xRRGGBB hex colors.
# These derive border, bar, and workspace indicator colors at runtime.
# ----------------------------------------------------------------------

theme {
    bg 0x111111                 # bg / background
    surface 0x1b1b1b
    text 0xf2f2f2
    text_muted 0x5c5c5c        # text_muted / muted
    accent 0x6bacac
    accent_soft 0x458588
    border 0x353535
}

# ----------------------------------------------------------------------
# Environment
# Set environment variables and source files before clients start.
# Processed in order — later entries can use earlier ones.
# ----------------------------------------------------------------------

environment {
    # env XDG_CURRENT_DESKTOP "kara"
    # env QT_QPA_PLATFORM "wayland"
    # env MOZ_ENABLE_WAYLAND "1"

    # Source a shell script (env vars it exports become available)
    # source "~/.local/state/kara/generated/session-theme.sh"
}

# ----------------------------------------------------------------------
# Input
# Per-device libinput configuration.
# Top-level keys are defaults; device "name" { } overrides per device.
# ----------------------------------------------------------------------

input {
    # Global defaults
    # accel_profile adaptive    # flat | adaptive
    # natural_scroll false
    # tap_to_click true
    # dwt true                  # disable while typing

    # Per-device overrides (match by libinput device name)
    # device "BT mouse" {
    #     accel_profile flat
    #     accel_speed 0
    # }
}

# ----------------------------------------------------------------------
# Animations
# level: none | light | heavy
# Per-animation overrides: name duration_ms easing
# Easing: linear | ease-in | ease-out | ease-in-out
# ----------------------------------------------------------------------

animations {
    preset swoosh           # instant | clean | swoosh
    duration 150            # ms, applies to all transitions
}

# ----------------------------------------------------------------------
# Bar
# ----------------------------------------------------------------------

bar {
    enabled true                # show/hide the bar entirely
    background true             # draw bar background
    position top                # top / bottom

    height 24                   # bar height in pixels
    radius 0                    # corner radius (pill-style modules)

    # Module rendering style:
    #   flat - text only
    #   pill - rounded pill backgrounds behind each module
    modules flat

    icons true                  # show nerd-font icons in modules
    colors true                 # colorize modules by state
    minimal false               # minimal presentation mode

    # Outer margins (bar window inset from screen edge)
    margin_x 0
    margin_y 0

    # Inner content margins
    content_margin_x 12
    content_margin_y 0

    # Spacing between modules
    gap 18
    padding_x 12
    padding_y 0

    # Inline volume bar graph
    volume_bar_enabled true
    volume_bar_width 46
    volume_bar_height 6
    volume_bar_radius 10

    # Module placement - each line: <section> <module> [arg]
    # Sections: left, center, right
    #
    # Built-in modules:
    #   workspaces  - workspace indicators
    #   monitor     - current monitor id + sync indicator
    #   title       - focused window title
    #   status      - status text (future: IPC)
    #   clock       - time/date (optional strftime format arg)
    #   volume      - audio volume (PipeWire/PulseAudio via wpctl)
    #   network     - network connectivity (wifi alias also works)
    #   battery     - battery charge and status
    #   brightness  - screen brightness (via /sys/class/backlight)
    #   media       - media player info (via playerctl)
    #   memory      - RAM usage percentage (ram alias also works)
    #   cpu         - CPU usage percentage
    #   weather     - weather from KARA_WEATHER_CMD env var
    #   custom      - arbitrary shell command (arg: command)
    #
    # Script modules (cached, env-var driven):
    #   script:weather   - KARA_WEATHER_CMD
    #   script:updates   - KARA_UPDATES_CMD
    #   script:cpu       - KARA_CPU_CMD
    #   script:disk      - KARA_DISK_CMD

    modules {
        left monitor
        left workspaces

        center title

        right cpu
        right memory
        right network
        right volume
        right clock "%a %d %b %H:%M"
    }
}

# ----------------------------------------------------------------------
# Scratchpad
# A floating overlay workspace toggled with a keybind.
# Autostart commands run on first toggle if the scratchpad is empty.
# ----------------------------------------------------------------------

scratchpad "main" {
    width_pct 94                # overlay width (40-100% of workarea)
    height_pct 94               # overlay height (40-100% of workarea)
    dim_alpha 120               # background dim opacity (0-255)
    blur false                  # blur background (future)
    autostart "$terminal"       # command run on first toggle
    # capture app_id "kitty"   # capture windows by app_id
}

# scratchpad "mixer" {
#     width_pct 40
#     height_pct 60
#     dim_alpha 128
#     autostart "pavucontrol"
#     capture app_id "pavucontrol"
# }

# scratchpad "music" {
#     width_pct 50
#     height_pct 70
#     dim_alpha 96
#     autostart "spotify"
#     capture app_id "spotify"
# }

# ----------------------------------------------------------------------
# Rules
# Float and workspace placement rules matched by app_id.
# ----------------------------------------------------------------------

rules {
    # Force windows to float
    float app_id "pavucontrol"
    float app_id "mpv"

    # Assign to workspace (1-9)
    # workspace 8 app_id "thunderbird"

    # Assign to workspace on a specific monitor (1-indexed)
    # workspace 3 app_id "firefox" monitor 1
}

# ----------------------------------------------------------------------
# Autostart
# Commands run once at startup. Not re-run on config reload.
# ----------------------------------------------------------------------

autostart {
    # run "dunst"
    # run "firefox"
}

# ----------------------------------------------------------------------
# Commands
# Named commands referenced by keybinds via `spawn "name"`.
# Commands are split into argv (no shell expansion).
# ----------------------------------------------------------------------

commands {
    terminal "$terminal"

    vol-up "wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+"
    vol-down "wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-"
    vol-mute "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle"

    bright-up "brightnessctl set +10%"
    bright-down "brightnessctl set 10%-"

    media-play "playerctl play-pause"
    media-next "playerctl next"
    media-prev "playerctl previous"
}

# ----------------------------------------------------------------------
# Keybinds
# Format: "modifier+key" action [arg]
#
# Modifiers: mod (Super), Shift, Ctrl, Alt
# Key names: xkbcommon names (Return, bracketleft, XF86AudioRaiseVolume, etc.)
#
# Range expansion: {1-9} expands to 9 keybinds.
#
# Actions:
#   spawn "cmd-name"    - run a named command (from commands block)
#   exec "command"      - run a raw shell command directly
#   scratchpad          - toggle scratchpad overlay
#   scratchpad "name"   - toggle a named scratchpad
#   focus_next/prev     - cycle focus between tiled windows
#   focus_monitor_next/prev - move focus between monitors
#   send_monitor_next/prev  - send focused window to next/prev monitor
#   decrease/increase_mfact - resize master area
#   zoom_master         - swap focused window into master
#   monocle             - toggle monocle (single window) layout
#   fullscreen          - toggle true fullscreen
#   toggle_sync         - toggle workspace sync across monitors
#   toggle_float / float - toggle floating mode for focused window
#   kill_client         - close focused window
#   reload              - reload config (SIGUSR1)
#   quit                - exit kara-gate
#   view_ws N           - switch to workspace N (1-9)
#   send_ws N           - send focused window to workspace N (1-9)
# ----------------------------------------------------------------------

binds {
    "mod+Return" spawn "terminal"
    "mod+d" exec "kara-summon"
    "Print" exec "kara-glimpse"

    "mod+apostrophe" scratchpad "main"

    "mod+j" focus_next
    "mod+k" focus_prev
    "mod+h" focus_monitor_prev
    "mod+l" focus_monitor_next
    "mod+Shift+h" send_monitor_prev
    "mod+Shift+l" send_monitor_next

    "mod+bracketleft" decrease_mfact
    "mod+bracketright" increase_mfact
    "mod+Shift+Return" zoom_master

    "mod+f" monocle
    "mod+Shift+f" fullscreen
    "mod+t" toggle_float
    "mod+s" toggle_sync
    "mod+q" kill_client
    "mod+Shift+r" reload
    "mod+Shift+q" quit

    "mod+{1-9}" view_ws {1-9}
    "mod+Shift+{1-9}" send_ws {1-9}

    "XF86AudioRaiseVolume" spawn "vol-up"
    "XF86AudioLowerVolume" spawn "vol-down"
    "XF86AudioMute" spawn "vol-mute"

    "XF86MonBrightnessUp" spawn "bright-up"
    "XF86MonBrightnessDown" spawn "bright-down"

    "XF86AudioPlay" spawn "media-play"
    "XF86AudioNext" spawn "media-next"
    "XF86AudioPrev" spawn "media-prev"
}

# ----------------------------------------------------------------------
# Includes
# Split config into multiple files. Paths are relative to this file
# or absolute. ~ expands to $HOME. Max include depth: 16.
# ----------------------------------------------------------------------

# If using kara-beautify for theming:
# include "~/.local/state/kara/generated/kara-gate-theme.conf"
