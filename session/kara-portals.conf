# xdg-desktop-portal routing for the kara desktop environment.
#
# Installed to /usr/share/xdg-desktop-portal/kara-portals.conf.
#
# xdg-desktop-portal matches portal backend implementations to
# desktops via `[preferred]` lookups keyed by XDG_CURRENT_DESKTOP.
# Without an entry for "kara", the portal router doesn't know
# which backend to use for interfaces like Settings, FileChooser,
# or Notification — meaning Firefox can't live-switch
# prefers-color-scheme when kara-beautify changes the theme, and
# file pickers from sandboxed apps silently fail.
#
# We route everything through the GTK backend by default since
# xdg-desktop-portal-gtk implements all the portal interfaces we
# care about (Settings in particular for color-scheme live
# reload), and it's the most broadly-compatible implementation.
# Users on KDE can edit /etc/xdg-desktop-portal/kara-portals.conf
# to override individual interfaces if they prefer kde-portal's
# Notification or FileChooser.

[preferred]
default=gtk
org.freedesktop.impl.portal.Settings=gtk
