[meta]
name = "cloud"
mode = "light"

[wallpaper]

[palette]
primary = "#7aa2f7"
accent_strategy = "balanced"
contrast = "medium"

[style]
radius = "large"
density = "roomy"
surface_style = "soft"
transparency = 0.86
blur = true

[fonts]
ui_family = "FiraCode Nerd Font"
ui_size = 11
mono_family = "FiraCode Nerd Font"
mono_size = 13

[cursor]
theme = "Bibata-Modern-Ice"
size = 24

[nvim]
preset = "semantic"
transparent = true

[vwm_bar]
style = "floating"
background = false
modules = "pill"
icons = true
colors = true
minimal = false
height = 30
radius = 22
margin_x = 18
margin_y = 12
padding_y = 6
