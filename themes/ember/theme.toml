# kara-beautify: ember
#
# Dark-fantasy theme. Deep blacks, blood red, castle ruins mood.
# This is the theme where beautify stretches beyond palette-only into
# real graphic decorations — borders sampled from 9-slice textures,
# bar backgrounds with tiled art, cursor/icon theme overrides, etc.
#
# v1 renderers still only consume the palette. The [variants.*.borders],
# [variants.*.bar_graphics], [variants.*.cursor], [variants.*.icons],
# [variants.*.sounds] blocks below are parsed opaquely by ThemeSpec
# (VariantSpec.extensions is a flattened BTreeMap<String, toml::Value>)
# so ember can be authored today and gain textures automatically when
# v2 renderers land in a later beautify milestone.
#
# Name is provisional — will be renamed when Charlton picks final
# imagery and asset set.

[meta]
name = "ember"
display_name = "Ember"
author = "kara"
mode = "dark"
default_variant = "blood"

[wallpaper]

# Top-level palette is a fallback — each variant overrides it below.
[palette]
primary = "#a02828"
accent_strategy = "balanced"
contrast = "high"

[style]
radius = "none"
density = "normal"
surface_style = "flat"
transparency = 1.0
blur = false

[fonts]
ui_family = "FiraCode Nerd Font"
ui_size = 11
mono_family = "FiraCode Nerd Font"
mono_size = 13

[cursor]
theme = "Bibata-Modern-Classic"
size = 24

[nvim]
preset = "semantic"
transparent = true

[vwm_bar]
style = "docked"
background = true
modules = "flat"
icons = true
colors = true
minimal = false
height = 24
radius = 0
margin_x = 0
margin_y = 0
padding_y = 2

# ─── Variants ──────────────────────────────────────────────────────────
#
# Each ember variant is an inline palette (no `preset = ...` reference),
# so user-authored variants work the same way — no Rust code needed.
# The resolver falls back to derive-from-primary when no preset matches.
#
# When we hand-tune exact ember colors later, we'll add preset_ember_blood
# / _ash / _amber in kara-theme/src/derive.rs and add `preset = "ember-blood"`
# references here; the inline palette then becomes the fallback.

[variants.blood]
display_name = "Ember — Blood"
[variants.blood.palette]
primary = "#a02828"
accent_strategy = "balanced"
contrast = "high"

# Extended-theming stubs — parsed opaquely by v1, consumed by v2 renderers.
[variants.blood.borders]
focused_texture = "borders/blood-focused.9.png"
unfocused_texture = "borders/blood-unfocused.9.png"
thickness_px = 4
corner_overlay = "borders/blood-rune.svg"

[variants.blood.bar_graphics]
background = "bar/blood-banner.png"
background_tile = true
left_cap = "bar/blood-left.svg"
right_cap = "bar/blood-right.svg"

[variants.blood.cursor_override]
theme = "Ember-Blood-Cursors"
size = 24

[variants.blood.icons]
theme = "Ember-Icons"

[variants.blood.sounds]
notify = "sounds/ember-notify.ogg"
focus = "sounds/ember-focus.ogg"


[variants.ash]
display_name = "Ember — Ash"
[variants.ash.palette]
primary = "#786166"
accent_strategy = "muted"
contrast = "medium"

[variants.ash.borders]
focused_texture = "borders/ash-focused.9.png"
unfocused_texture = "borders/ash-unfocused.9.png"
thickness_px = 4

[variants.ash.bar_graphics]
background = "bar/ash-weathered.png"
background_tile = true


[variants.amber]
display_name = "Ember — Amber"
[variants.amber.palette]
primary = "#c37a16"
accent_strategy = "vivid"
contrast = "high"

[variants.amber.borders]
focused_texture = "borders/amber-focused.9.png"
unfocused_texture = "borders/amber-unfocused.9.png"
thickness_px = 4

[variants.amber.bar_graphics]
background = "bar/amber-forge.png"
background_tile = true
