# kara-beautify: fantasy
#
# Dark-fantasy theme with heavy styling ambitions. Where the default
# theme lives in palette-only territory, `fantasy` is the place kara
# stretches beyond color into real graphic decorations — 9-slice
# border textures, tiled bar backgrounds, per-variant cursor themes,
# icon packs, and eventually audio cues.
#
# v1 renderers still only consume the palette. The [variants.*.borders],
# [variants.*.bar_graphics], [variants.*.cursor_override],
# [variants.*.icons], [variants.*.sounds] blocks below are parsed
# opaquely by ThemeSpec (VariantSpec.extensions is a flattened
# BTreeMap<String, toml::Value>) so variants can be authored today
# and gain textures automatically when v2 renderers land.
#
# Variants:
#   blood  — deep red, the canonical "fantasy" look
#   venom  — toxic green, poison / alchemy mood
#   wraith — ghostly purple, undead / spectral mood
#
# Name "fantasy" is still a working label; swap freely once final
# imagery and asset sets are picked.

# GTK / icon theme picks — dark, high-contrast. Placeholder values;
# swap in a more fantasy-flavored GTK theme (e.g. a custom stone /
# parchment theme) when one is chosen.
# (Root-level keys must appear before any [section] header.)
gtk_theme = "Adwaita-dark"
icon_theme = "Adwaita"
# NOTE: install `papirus-icon-theme` for a denser colored set that
# reads better against fantasy palettes.

[meta]
name = "fantasy"
author = "kara"
mode = "dark"
default_variant = "blood"

[wallpaper]

# Top-level palette is a fallback — each variant overrides it below.
[palette]
primary = "#a02828"
accent_strategy = "balanced"
contrast = "high"

[style]
radius = "none"
density = "normal"
surface_style = "flat"
transparency = 0.92
blur = false

[fonts]
ui_family = "FiraCode Nerd Font"
ui_size = 11
mono_family = "FiraCode Nerd Font"
mono_size = 13

[cursor]
# Night-Diamond-Red — crimson, high-contrast, matches the blood
# palette. AUR: night-diamond-cursor-theme installs both -Red and
# -Blue variants. Swapped back from Rage-Gothic because the Rage
# art reads as cold blue rather than the warm crimson we want for
# the gothic look. Alternates: Bibata-Modern-Classic (neutral
# pointer), Rage-Gothic (if you prefer the blue look).
theme = "Night-Diamond-Red"
size = 24

# ─── Reserved structured slots (no renderer consumes these yet) ────
# Forward-compatible decoration slots. Per-variant legacy blocks
# below (`[variants.blood.borders]`, `[variants.blood.sounds]`, etc.)
# are still parsed via the VariantSpec.extensions opaque map and can
# coexist with these structured blocks.

[window_border]
width = 6
radius = 0
color_focused = "$accent"
color_unfocused = "$bg2"
color_urgent = "$danger"

# Gothic stained-stone repeating tile. kara-beautify rasterizes
# this on apply into a PNG that kara-gate tiles across the border
# rect in place of the solid-color fill above. Width of 6px gives
# the pattern enough real estate to read.
[window_border.svg_tile]
path = "borders/gothic-tile.svg"
tile_width = 48
tile_height = 48
edge_mode = "repeat"
opacity = 1.0
tint_from_palette = "$accent"

[window_border.svg_overlay]
path = "borders/fantasy-rune-corner.svg"
anchor = "corner"
opacity = 1.0
tint_from_palette = "$accent"

# Fantasy's bar: no background fill so pill modules float over
# whatever is behind (wallpaper / windows). Generous height + padding
# so the gothic pill shape reads without feeling cramped. Pill mode
# gives each module its own rounded surface that the future
# module_background_svg renderer will tile the gothic pattern into.
[bar]
background = false
background_alpha = 0
height = 36
pill = true
hide_center = true
edge_padding_x = 18
edge_padding_y = 6
module_gap = 14
module_padding_x = 16
module_padding_y = 8
module_rounded = 10
font_family = "FiraCode Nerd Font"
font_size = 12

# Reserved — once kara-sight wires module SVG surfaces, this slot
# will get rasterized alongside window_border.svg_tile and each pill
# will tile the same gothic pattern used on window borders.
[bar.module_background_svg]
path = "borders/gothic-tile.svg"
tile_width = 48
tile_height = 48
edge_mode = "repeat"
opacity = 1.0

[bar.svg_overlay]
path = "bar/fantasy-banner.svg"
mode = "background"
opacity = 0.9

[sounds]
theme_name = "freedesktop"
[sounds.events]
notify_normal = "message-new-instant.oga"
notify_critical = "dialog-warning.oga"
focus = "window-attention.oga"

[animations]
duration_ms_fast = 140
duration_ms_normal = 240
duration_ms_slow = 420
easing = "ease-out-cubic"

[nvim]
preset = "semantic"
transparent = true

[vwm_bar]
style = "docked"
background = true
modules = "flat"
icons = true
colors = true
minimal = false
height = 24
radius = 0
margin_x = 0
margin_y = 0
padding_y = 2

# ─── Variants ──────────────────────────────────────────────────────────
#
# Each variant is an inline palette (no `preset = ...` reference),
# so user-authored variants work the same way — no Rust code needed.
# The resolver falls back to derive-from-primary when no preset matches.
#
# When we hand-tune exact colors, we'll add preset_fantasy_blood /
# preset_fantasy_venom / preset_fantasy_wraith in kara-theme/src/derive.rs
# and add `preset = "fantasy-blood"` references here; the inline palette
# stays as a fallback if a user rebuilds without those presets.

[variants.blood]
[variants.blood.palette]
primary = "#a02828"
accent_strategy = "balanced"
contrast = "high"

# Extended-theming stubs — parsed opaquely by v1, consumed by v2 renderers.
[variants.blood.borders]
focused_texture = "borders/blood-focused.9.png"
unfocused_texture = "borders/blood-unfocused.9.png"
thickness_px = 4
corner_overlay = "borders/blood-rune.svg"

[variants.blood.bar_graphics]
background = "bar/blood-banner.png"
background_tile = true
left_cap = "bar/blood-left.svg"
right_cap = "bar/blood-right.svg"

[variants.blood.cursor_override]
theme = "Fantasy-Blood-Cursors"
size = 24

[variants.blood.icons]
theme = "Fantasy-Icons"

[variants.blood.sounds]
notify = "sounds/fantasy-notify.ogg"
focus = "sounds/fantasy-focus.ogg"


[variants.venom]
[variants.venom.palette]
# Toxic green — poison, alchemy, rot. Muted so it reads as
# decayed rather than neon.
primary = "#6a8a2a"
accent_strategy = "balanced"
contrast = "high"

[variants.venom.borders]
focused_texture = "borders/venom-focused.9.png"
unfocused_texture = "borders/venom-unfocused.9.png"
thickness_px = 4
corner_overlay = "borders/venom-rune.svg"

[variants.venom.bar_graphics]
background = "bar/venom-marsh.png"
background_tile = true


[variants.wraith]
[variants.wraith.palette]
# Ghostly purple — undead, spectral, arcane. On the muted side
# so it feels like drifting mist rather than a neon accent.
primary = "#7a4fa0"
accent_strategy = "balanced"
contrast = "high"

[variants.wraith.borders]
focused_texture = "borders/wraith-focused.9.png"
unfocused_texture = "borders/wraith-unfocused.9.png"
thickness_px = 4
corner_overlay = "borders/wraith-rune.svg"

[variants.wraith.bar_graphics]
background = "bar/wraith-veil.png"
background_tile = true
