# kara-beautify: moonlight
#
# Cool, nocturnal palette family. Where `default` leans palette-neutral
# and `fantasy` leans graphic-heavy, `moonlight` lives in the
# pale-blue / silver / midnight space. Variants are mood dials rather
# than wholesale aesthetic swaps — same nightfall feel, different
# depth of night.
#
# Variants (names are suggestions — rename freely):
#   calm    — soft silvery blue, high-moon clear night
#   deep    — midnight navy, late-night low-light
#   frost   — icy cyan, waxing-moon crispness
#
# Wallpapers live outside the repo. Drop per-variant assets into
#   ~/.local/share/kara/themes/moonlight/wallpapers/
# or, for dev from a cargo-run checkout, themes/moonlight/wallpapers/
# (gitignored). Each variant's `wallpaper = "..."` value is a bare
# filename resolved against that directory at apply time.

# GTK / icon theme picks — dark, cool-leaning. Override freely.
# (Root-level keys must appear before any [section] header.)
gtk_theme = "Adwaita-dark"
icon_theme = "Adwaita"
# file_icon_theme defaults to icon_theme when unset.
# NOTE: install `papirus-icon-theme` (AUR) and swap icon_theme to
# `Papirus-Dark` for a denser, more colorful look.

[meta]
name = "moonlight"
author = "kara"
mode = "dark"
default_variant = "calm"

[wallpaper]
# Top-level fallback — each variant overrides below.

[palette]
primary = "#8fa3c4"
accent_strategy = "balanced"
contrast = "medium"

[style]
radius = "none"
density = "normal"
surface_style = "soft"
transparency = 0.92
blur = false

[fonts]
ui_family = "FiraCode Nerd Font"
ui_size = 12
mono_family = "FiraCode Nerd Font"
mono_size = 14

[cursor]
# JYxNeon — neon glow cursor, fits the moonlight/cyber-cool vibe.
# AUR (local): vxneon-cursor-theme. Installed dir is "JYxNeon"
# (upstream internal name, not "vxNeon").
theme = "JYxNeon"
size = 24

# ─── Reserved structured slots (no renderer consumes these yet) ────
# These blocks are schema-only today. They let the theme TOML carry
# forward-compatible decoration data that future renderers will pick
# up without requiring a schema migration. Edit freely — unknown
# renderer behavior is "ignore".

[window_border]
width = 2
radius = 0
color_focused = "$accent"
color_unfocused = "$bg2"
color_urgent = "$warning"

[bar]
hide_center = true
height = 38
background = true
background_color = "$bg"
background_alpha = 60
blur = true
edge_padding_x = 14
edge_padding_y = 4
module_gap = 14
font_family = "ProFont IIx Nerd Font"
font_size = 18

[animations]
duration_ms_fast = 120
duration_ms_normal = 200
duration_ms_slow = 350
easing = "ease-out-cubic"

[nvim]
preset = "semantic"
transparent = true

[vwm_bar]
style = "docked"
background = true
modules = "flat"
icons = true
colors = true
minimal = false
height = 24
radius = 0
margin_x = 0
margin_y = 0
padding_y = 2

# ─── Variants ──────────────────────────────────────────────────────────
#
# Each variant is an inline palette — no `preset = ...` reference yet,
# so users can author their own in ~/.local/share/kara/themes/moonlight/
# without needing to rebuild kara-theme. Colors here are first-cut
# guesses that fit the "nightfall" brief; hand-tune them against real
# wallpapers when those land.

[variants.calm]
wallpaper = "calm.mp4"
[variants.calm.palette]
# Pale slate blue — a clear, high-moon night.
primary = "#8fa3c4"
accent_strategy = "balanced"
contrast = "medium"

[variants.deep]
wallpaper = "deep.mp4"
[variants.deep.palette]
# Midnight navy — dense, late-night low-light.
primary = "#3b4a6b"
accent_strategy = "balanced"
contrast = "medium"

[variants.frost]
wallpaper = "frost.mp4"
[variants.frost.palette]
# Icy cyan — waxing moon over snow.
primary = "#a6c4c8"
accent_strategy = "balanced"
contrast = "medium"
