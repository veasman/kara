[meta]
name = "moonlight"
mode = "dark"

[wallpaper]

[palette]
primary = "#cc241d"
accent_strategy = "vivid"
contrast = "high"

[style]
radius = "none"
density = "compact"
surface_style = "flat"
transparency = 0.95
blur = false

[fonts]
ui_family = "FiraCode Nerd Font"
ui_size = 11
mono_family = "FiraCode Nerd Font"
mono_size = 13

[cursor]
theme = "Bibata-Modern-Classic"
size = 24

[nvim]
preset = "semantic"
transparent = true

[vwm_bar]
style = "docked"
background = true
modules = "flat"
icons = true
colors = true
minimal = false
height = 22
radius = 0
margin_x = 0
margin_y = 0
padding_y = 0
